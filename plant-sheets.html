<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plant Intelligence Sheets</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0;
      font-family:'Montserrat', sans-serif;
      background:#f5f2ec;
      color:#2f2f2f;
      padding:40px 20px;
    }
    .wrap{
      max-width:700px;
      margin:0 auto;
      background:white;
      border-radius:16px;
      padding:50px 35px;
      box-shadow:0 12px 30px rgba(0,0,0,0.08);
      text-align:center;
    }
    h1{
      font-family:'Playfair Display', serif;
      font-size:46px;
      margin:0 0 16px 0;
      color:#1f1f1f;
    }
    p{
      font-size:18px;
      line-height:1.6;
      color:#555;
      margin:0 0 24px 0;
    }
    form{
      margin-top:30px;
    }
    input{
      width:100%;
      box-sizing:border-box;
      padding:16px;
      margin-bottom:14px;
      font-size:16px;
      border:1px solid #d7d7d7;
      border-radius:8px;
    }
    button, .download-btn{
      display:inline-block;
      background:#9b7d52;
      color:white;
      text-decoration:none;
      border:none;
      border-radius:8px;
      padding:16px 28px;
      font-size:18px;
      cursor:pointer;
      font-family:'Montserrat', sans-serif;
    }
    button:hover, .download-btn:hover{
      background:#7f6540;
    }
    .small{
      font-size:14px;
      color:#777;
      margin-top:18px;
    }
    .success{
      display:none;
      margin-top:25px;
      padding-top:20px;
      border-top:1px solid #e6e6e6;
    }
    .success h2{
      font-family:'Playfair Display', serif;
      font-size:32px;
      margin-bottom:12px;
      color:#1f1f1f;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Plant Intelligence Sheets</h1>
    <p>
      Get the companion quick-reference sheets for small-space growers.
      Simple, printable guides for planning, growing, and staying on track.
    </p>

    <form id="leadForm" action="https://formspree.io/f/REPLACE_ME" method="POST">
      <input type="text" name="first_name" placeholder="First name" required>
      <input type="email" name="email" placeholder="Email address" required>
      <button type="submit">Get the Sheets</button>
    </form>

    <div class="success" id="successBox">
      <h2>Your sheets are ready</h2>
      <p>Download them now below.</p>
      <a class="download-btn" href="plant-sheets.pdf" target="_blank">Download the PDF</a>
      <div class="small">We’ll also email them later if you add automation.</div>
    </div>
  </div>

  <script>
    const form = document.getElementById('leadForm');
    const successBox = document.getElementById('successBox');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const data = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: form.method,
          body: data,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          form.style.display = 'none';
          successBox.style.display = 'block';
        } else {
          alert('Something went wrong. Please try again.');
        }
      } catch (error) {
        alert('Something went wrong. Please try again.');
      }
    });
  </script>
</body>
</html>
